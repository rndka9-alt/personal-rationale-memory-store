services:
  app:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: ["npm", "run", "start:mcp"]
    stdin_open: true
    tty: true

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rationale
      POSTGRES_PASSWORD: rationale
      POSTGRES_DB: rationale_memory
    ports:
      - "54329:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rationale -d rationale_memory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
