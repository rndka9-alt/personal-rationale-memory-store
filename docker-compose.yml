services:
  mcp:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:3443:3443"
    environment:
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-3443}
      MCP_PATH: ${MCP_PATH:-/mcp}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    command: ["npm", "run", "start:mcp"]
    stdin_open: true
    tty: true

  web:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:3450:3450"
    environment:
      WEB_HOST: ${WEB_HOST:-0.0.0.0}
      WEB_PORT: ${WEB_PORT:-3450}
      WEB_AUTH_TOKEN: ${WEB_AUTH_TOKEN:-}
    command: ["npm", "run", "start:web"]

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - mcp
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rationale
      POSTGRES_PASSWORD: rationale
      POSTGRES_DB: rationale_memory
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql/data
      - type: bind
        source: ./migrations
        target: /docker-entrypoint-initdb.d
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rationale -d rationale_memory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
    name: rationale-memory-postgres-data
